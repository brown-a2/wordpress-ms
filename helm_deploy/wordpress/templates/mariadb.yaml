apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mariadb
  namespace: wordpress-ms-prod
  labels:
    app: mariadb
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mariadb
  serviceName: mariadb
  template:
    metadata:
      labels:
        app: mariadb
    spec:
      containers:
        - name: mariadb
          image: mariadb:10.11
          ports:
            - containerPort: 3306
          envFrom:
            - secretRef:
                name: mariadb-secrets
          volumeMounts:
            - name: mariadb-data
              mountPath: /var/lib/mysql
            - name: mariadb-vol-config
              mountPath: /etc/mysql/conf.d/wpms.cnf
              subPath: wpms.cnf
      volumes:
        - name: mariadb-vol-config
          configMap:
            name: mariadb-config
        - name: mariadb-data
          persistentVolumeClaim:
            claimName: mariadb-data-pvc
